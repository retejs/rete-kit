name: Test Nuxt build 
run-name: Test Nuxt build for ${{ inputs.os }}

on:
  workflow_call:
    inputs:
      os:
        description: 'OS'
        required: true
        type: string
      kit-source:
        description: 'Rete Kit version source (npm or github)'
        type: string
        default: 'npm'
      kit-version:
        description: 'Rete Kit version/reference'
        type: string
        default: 'latest'
  workflow_dispatch:
    inputs:
      os:
        description: 'OS'
        required: true
        type: choice
        options:
        - ubuntu-latest
        - windows-latest
        - macos-latest
      kit-source:
        description: 'Rete Kit version source (npm or github)'
        type: choice
        options:
        - npm
        - github
        default: 'npm'
      kit-version:
        description: 'Rete Kit version/reference'
        type: string
        default: 'latest'

jobs:
  nuxt:
    name: Nuxt
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        version: [3, 4]
    uses: ./.github/workflows/test-build.yml
    with:
      os: ${{ inputs.os }}
      stack: nuxt
      version: ${{ matrix.version }}
      node: 20
      kit-source: ${{ inputs.kit-source }}
      kit-version: ${{ inputs.kit-version }}
      features: "Vue render,${{ vars.FEATURES }}"
          
