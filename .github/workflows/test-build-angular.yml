name: Test Angular build
run-name: Test Angular build for ${{ inputs.os }}

on:
  workflow_call:
    inputs:
      os:
        description: 'OS'
        required: true
        type: string
      kit-source:
        description: 'Rete Kit version source (npm or github)'
        type: string
        default: 'npm'
      kit-version:
        description: 'Rete Kit version/reference'
        type: string
        default: 'latest'
  workflow_dispatch:
    inputs:
      os:
        description: 'OS'
        required: true
        type: choice
        options:
        - ubuntu-latest
        - windows-latest
        - macos-latest
      kit-source:
        description: 'Rete Kit version source (npm or github)'
        type: choice
        options:
        - npm
        - github
        default: 'npm'
      kit-version:
        description: 'Rete Kit version/reference'
        type: string
        default: 'latest'

jobs:
  build:
    name: ${{ matrix.version }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        version: [22,21,20,19,18,17,16,15,14,13,12]
    uses: ./.github/workflows/test-build.yml
    secrets: inherit
    with:
      os: ${{ inputs.os }}
      stack: angular
      version: ${{ matrix.version }}
      node: ${{ (matrix.version >=20 && 22) || (matrix.version >=17 && 18) || 16 }}
      kit-source: ${{ inputs.kit-source }}
      kit-version: ${{ inputs.kit-version }}
      features: "Angular render,${{ vars.FEATURES }}"
